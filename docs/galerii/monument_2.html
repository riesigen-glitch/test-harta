<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Galerie - Cimitirul Eroilor din Suceava</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  background: #000;
  color: #fff;
  font-family: Arial, sans-serif;
  overflow: hidden;
  height: 100%;
}
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.97);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.topbar {
  position: absolute;
  top: 14px;
  left: 14px;
  right: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 20;
}
.title {
  font-size: 18px;
  font-weight: bold;
}
.close-btn {
  font-size: 34px;
  color: white;
  text-decoration: none;
  font-weight: bold;
  line-height: 1;
}
.viewer {
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  padding-top: 60px;
  padding-bottom: 120px;
  box-sizing: border-box;
}
.main-img {
  max-width: 90vw;
  max-height: 74vh;
  border-radius: 8px;
  box-shadow: 0 0 20px rgba(0,0,0,0.6);
}
.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 44px;
  color: white;
  background: rgba(255,255,255,0.12);
  border: none;
  width: 58px;
  height: 72px;
  cursor: pointer;
  z-index: 10;
  border-radius: 8px;
}
.arrow.left { left: 14px; }
.arrow.right { right: 14px; }
.caption {
  position: absolute;
  bottom: 88px;
  left: 50%;
  transform: translateX(-50%);
  color: #ddd;
  font-size: 15px;
  text-align: center;
  max-width: 80vw;
}
.thumbs {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 10px;
  overflow-x: auto;
  max-width: 92vw;
  padding: 6px 10px;
}
.thumb {
  width: 76px;
  height: 76px;
  object-fit: cover;
  border-radius: 50%;
  border: 3px solid transparent;
  cursor: pointer;
  opacity: 0.82;
  flex: 0 0 auto;
}
.thumb.active {
  border-color: #4da3ff;
  opacity: 1;
}
</style>
</head>
<body>
<div class="overlay">
  <div class="topbar">
    <div class="title">Cimitirul Eroilor din Suceava</div>
    <a class="close-btn" href="../harta_suceava.html">×</a>
  </div>

  <div class="viewer">
    <button class="arrow left" onclick="prevImg()">&#10094;</button>
    <img id="mainImg" class="main-img" src="" alt="Galerie">
    <button class="arrow right" onclick="nextImg()">&#10095;</button>
    <div id="caption" class="caption"></div>
    <div id="thumbs" class="thumbs"></div>
  </div>
</div>

<script>
const items = [{src:'../media/monument_2_1.jpg', caption:'Monument – Monumentul_eroilor_din_Suceava.jpg'},{src:'../media/monument_2_2.jpg', caption:'Monument – Monumentul_eroilor_din_Suceava2.jpg'}];
let currentIndex = 0;

function render() {
  const main = document.getElementById('mainImg');
  const caption = document.getElementById('caption');
  const thumbs = document.getElementById('thumbs');

  main.src = items[currentIndex].src;
  caption.textContent = items[currentIndex].caption || "";

  thumbs.innerHTML = "";
  items.forEach((item, index) => {
    const img = document.createElement('img');
    img.src = item.src;
    img.className = 'thumb' + (index === currentIndex ? ' active' : '');
    img.onclick = () => {
      currentIndex = index;
      render();
    };
    thumbs.appendChild(img);
  });
}

function prevImg() {
  currentIndex = (currentIndex - 1 + items.length) % items.length;
  render();
}

function nextImg() {
  currentIndex = (currentIndex + 1) % items.length;
  render();
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') prevImg();
  if (e.key === 'ArrowRight') nextImg();
  if (e.key === 'Escape') window.location.href = '../harta_suceava.html';
});

render();
</script>
</body>
</html>
